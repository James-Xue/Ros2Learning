name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      # 安装 ROS 2 Jazzy（与本地开发环境一致）
      - name: Setup ROS 2 Jazzy
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      # rosdep 安装依赖，跳过需要 MoveIt2 / Gazebo 的重量级 key
      - name: Install dependencies via rosdep
        run: |
          source /opt/ros/jazzy/setup.bash
          cd ros2_ws
          rosdep install --from-paths src --ignore-src -r -y \
            --skip-keys "\
              moveit_ros_planning_interface \
              moveit_resources_panda_moveit_config \
              moveit_resources_panda_description \
              turtlebot3_gazebo \
              qtbase5-dev"

      # 构建，跳过依赖 MoveIt2 / Qt5 的包
      - name: Build
        run: |
          source /opt/ros/jazzy/setup.bash
          cd ros2_ws
          colcon build \
            --packages-ignore \
              ros2_learning_arm_basics \
              ros2_learning_panda_gazebo_demo \
              ros2_learning_sysinfo_qt_viewer \
            --cmake-args -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            --event-handlers console_cohesion+

      # 运行测试并报告结果（失败则 workflow 报红）
      - name: Test
        run: |
          source /opt/ros/jazzy/setup.bash
          source ros2_ws/install/setup.bash
          cd ros2_ws
          colcon test \
            --packages-ignore \
              ros2_learning_arm_basics \
              ros2_learning_panda_gazebo_demo \
              ros2_learning_sysinfo_qt_viewer \
            --event-handlers console_cohesion+
          colcon test-result --verbose
